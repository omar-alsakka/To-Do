<div class="modal-backdrop" *ngIf="isOpen()" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Create New Task</h2>
      <button class="close-btn" (click)="onClose()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSave()" class="modal-body">
      <!-- Task Title -->
      <div class="form-group">
        <div class="label-with-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12V4"/><path d="M4 12v8"/><path d="M20 12V4"/><path d="M20 12v8"/><path d="M4 12h16"/></svg>
          <label for="title">Task Title <span class="required">*</span></label>
        </div>
        <input type="text" id="title" formControlName="title" placeholder="What needs to be done?" [ngClass]="{'error': taskForm.get('title')?.invalid && taskForm.get('title')?.touched}">
      </div>

      <div class="form-row">
        <!-- Priority -->
        <div class="form-group half">
          <div class="label-with-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
            <label for="priority">Priority</label>
          </div>
          <div class="select-wrapper">
            <select id="priority" formControlName="priority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <!-- Due Date -->
        <div class="form-group half">
          <div class="label-with-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <label for="dueDate">Due Date</label>
          </div>
          <input type="date" id="dueDate" formControlName="dueDate">
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <div class="label-with-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <label for="description">Description</label>
        </div>
        <textarea id="description" formControlName="description" rows="4" placeholder="Add more details about this task..."></textarea>
        <div class="char-count">{{ descriptionCount() }}/500</div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="onClose()">Cancel</button>
        <button type="submit" class="btn-add" [disabled]="taskForm.invalid">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          {{ taskToEdit() ? 'Update' : 'Add Task' }}
        </button>
      </div>
    </form>
  </div>
</div>
